<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <defs>
    <radialGradient id="bgGlow" cx="70%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#2a1f4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f0a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="serverTopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a5a6a"/>
      <stop offset="100%" stop-color="#4a4a5a"/>
    </linearGradient>
    <linearGradient id="serverFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a48"/>
      <stop offset="100%" stop-color="#2a2a38"/>
    </linearGradient>
    <linearGradient id="serverSideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d3a"/>
      <stop offset="100%" stop-color="#1f1f2a"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="200" cy="130" rx="120" ry="100" fill="url(#bgGlow)"/>
  
  <!-- Server 3 (bottom) -->
  <g transform="translate(30, 165)">
    <polygon points="50,0 90,20 70,35 30,15" fill="url(#serverTopGrad)" opacity="0.9"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="url(#serverFrontGrad)"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="url(#serverSideGrad)"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#1a1a24" stroke-width="2"/>
    <line x1="70" y1="60" x2="90" y2="45" stroke="#1a1a24" stroke-width="2"/>
    <circle cx="25" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="38" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="51" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="64" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <rect x="25" y="50" width="35" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
    <rect x="25" y="55" width="20" height="3" rx="1" fill="rgba(255,255,255,0.06)"/>
  </g>
  
  <!-- Server 2 (middle) -->
  <g transform="translate(30, 120)">
    <polygon points="50,0 90,20 70,35 30,15" fill="url(#serverTopGrad)" opacity="0.9"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="url(#serverFrontGrad)"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="url(#serverSideGrad)"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#1a1a24" stroke-width="2"/>
    <line x1="70" y1="60" x2="90" y2="45" stroke="#1a1a24" stroke-width="2"/>
    <circle cx="25" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="38" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="51" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="64" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <rect x="25" y="50" width="35" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
    <rect x="25" y="55" width="20" height="3" rx="1" fill="rgba(255,255,255,0.06)"/>
  </g>
  
  <!-- Server 1 (top) -->
  <g transform="translate(30, 75)">
    <polygon points="50,0 90,20 70,35 30,15" fill="url(#serverTopGrad)" opacity="0.9"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="url(#serverFrontGrad)"/>
    <polygon points="10,35 70,35 70,60 10,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="url(#serverSideGrad)"/>
    <polygon points="70,35 90,20 90,45 70,60" fill="none" stroke="#1a1a24" stroke-width="2"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#1a1a24" stroke-width="2"/>
    <line x1="70" y1="60" x2="90" y2="45" stroke="#1a1a24" stroke-width="2"/>
    <circle cx="25" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="38" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="51" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="64" cy="42" r="4" fill="#22c55e" filter="url(#glow)"/>
    <rect x="25" y="50" width="35" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
    <rect x="25" y="55" width="20" height="3" rx="1" fill="rgba(255,255,255,0.06)"/>
  </g>
  
  <!-- Shield (foreground right) -->
  <g transform="translate(170, 90)" filter="url(#shieldGlow)">
    <path d="M0,0 L60,0 Q75,0 75,15 L75,45 Q75,75 37.5,95 Q0,75 0,45 L0,15 Q0,0 15,0 Z" 
          fill="url(#shieldGrad)" stroke="#15803d" stroke-width="2"/>
    <path d="M5,8 L55,8 Q67,8 67,18 L67,43 Q67,68 37.5,85 Q8,68 8,43 L8,18 Q8,8 18,8 Z" 
          fill="rgba(255,255,255,0.15)"/>
    <path d="M20,45 L33,58 L58,30" 
          fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>